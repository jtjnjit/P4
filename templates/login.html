<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Info Removal Form</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='stylesheet.css') }}">
    </head>
    <body class="d-flex flex-column min-vh-100">
        <header>
            <nav class="navbar navbar-expand-lg text-black shadow-sm border-bottom bg-white">
                <div class="container-fluid px-5">
                    <a class="navbar-brand fs-3" href="{{ url_for('index') }}">Triv.io</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="mainNav">
                        <ul class="navbar-nav ms-auto gap-3">
                            <li class="navbar-item dropdown">
                                <a class="nav-link dropdown-toggle text-dark fs-5" href="#" data-bs-toggle="dropdown">Play</a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item text-dark fs-6" href="{{ url_for('play_game') }}">Play Game</a></li>
                                    <li><hr class="dropdown-divider text-dark"></li>
                                    <li><a class="dropdown-item text-dark fs-6" href="{{ url_for('game_settings') }}">Game Settings</a></li>
                                    <li><a class="dropdown-item text-dark fs-6" href="{{ url_for('login') }}">Login</a></li>
                                    <li><a class="dropdown-item text-dark fs-6" href="{{ url_for('leaderboard') }}">Leaderboard</a></li>
                                </ul>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-dark fs-5" href="{{ url_for('contact') }}">Contact</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-dark fs-5" href="{{ url_for('info_removal') }}">Info Removal Form</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <div class="container mt-5 mb-5">
            <div class="row justify-content-center">
                <div class="col-10 col-lg-6">
                    <div class="card rounded-0">
                        <h3 class="card-header text-center">Login</h2>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label for="username" class="form-label">Username</label>
                                    <input type="text" maxlength="30" class="form-control" id="username" placeholder="Your username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="text" maxlength="255" class="form-control" id="password" placeholder="Your password" required>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" required>
                                    <label class="form-check-label" for="flexCheckDefault">
                                        By logging in you agree to your score being publicly posted on the leaderboard.
                                    </label>
                                </div>      
                                <div class="text-center mt-4">
                                    <button type="submit" class="contact-submit-button btn btn-primary border-dark">Login</button>
                                </div>
                                <p class="ms-2 mt-4 mb-0">Don't have an account? Create one below:</p>
                                <a href="{{ url_for('create_account') }}" class="ms-2 mt-0 fs-6">Create account</a>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center text-lg-start text-white shadow-lg mt-auto" style="background-color: #3f4348">
            <div class="text-center p-3 pt-2">
                <p class="mb-0 text-white">&copy; 2025 Jake Jarecki 3/26/2026</p>
                <a class="mb-0 me-2 text-white footer-link" href="{{ url_for('terms') }}" target="_blank">Terms of Service</a>
                <a class="mb-0 ms-2 text-white footer-link" href="{{ url_for('priv_statement') }}" target="_blank">Privacy Statement</a>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
